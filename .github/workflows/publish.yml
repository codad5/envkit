name: Publish

on:
  push:
    tags:
      - 'v*'

# Required for npm Trusted Publishing (OIDC)
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Publish core first — CLI depends on it.
      # NODE_AUTH_TOKEN is only needed for the very first publish (token-based bootstrap).
      # After Trusted Publishing is configured on npmjs.com, remove the env blocks below
      # and OIDC takes over automatically via the id-token: write permission above.
      - name: Publish envkit-core
        run: pnpm --filter envkit-core publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish envkit (CLI)
        run: pnpm --filter envkit publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
